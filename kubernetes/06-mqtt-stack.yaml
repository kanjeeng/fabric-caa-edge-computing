# Mosquitto ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: parking-fabric
data:
  mosquitto.conf: |
    allow_anonymous true
    listener 1883 0.0.0.0
    persistence false
    log_dest stdout
    connection_messages true
    log_type all

---
# Mosquitto Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: parking-fabric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2.0
          ports:
          - containerPort: 1883
          volumeMounts:
          - name: config
            mountPath: /mosquitto/config/mosquitto.conf
            subPath: mosquitto.conf
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: mosquitto-config

---
# Mosquitto Service (INI ADALAH PERBAIKANNYA)
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: parking-fabric
spec:
  type: NodePort
  ports:
  - port: 1883
    targetPort: 1883
    nodePort: 30883
    name: mqtt
  selector:
    app: mosquitto

---
# API Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: parking-fabric
spec:
  type: NodePort
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30080
    name: http
  selector:
    app: api-gateway

---
# API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: parking-fabric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:latest
          imagePullPolicy: Never
          ports:
          - containerPort: 3000
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m" # Beri tenaga 0.5 Core
          # --- PERBAIKAN 2: MOUNTING SERTIFIKAT FABRIC ---
          volumeMounts:
          - name: fabric-crypto
            mountPath: /app/crypto-config # Pastikan ini sesuai dengan path di server.js
            readOnly: true
      volumes:
        - name: fabric-crypto
          hostPath:
            # SESUAIKAN dengan path asli di virtualbox Anda
            path: /home/cana/Desktop/parking-blockchain-lite/fabric-network/crypto-config
            type: Directory

---
# MQTT Bridge Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-bridge
  namespace: parking-fabric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-bridge
  template:
    metadata:
      labels:
        app: mqtt-bridge
    spec:
      containers:
        - name: mqtt-bridge
          image: mqtt-bridge:latest
          imagePullPolicy: Never
          env:
          - name: MQTT_BROKER_HOST
            value: "mosquitto"
          - name: MQTT_BROKER_PORT
            value: "1883"
          - name: API_GATEWAY_URL
            value: "http://api-gateway:3000"
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "50m"