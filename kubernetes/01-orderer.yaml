# kubernetes/01-orderer.yaml
# ==================== ORDERER 1 ====================
apiVersion: v1
kind: Service
metadata:
  name: orderer1
  namespace: parking-fabric
  labels:
    app: orderer1
spec:
  type: ClusterIP
  ports:
  - port: 7050
    targetPort: 7050
    name: grpc
  - port: 8443
    targetPort: 8443
    name: operations
  selector:
    app: orderer1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderer1
  namespace: parking-fabric
  labels:
    app: orderer1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orderer1
  template:
    metadata:
      labels:
        app: orderer1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8443"
        prometheus.io/scheme: "http"
        prometheus.io/path: "/metrics"
    spec:
      initContainers:
      - name: copy-materials
        image: busybox:1.35
        command: ['sh', '-c']
        args:
          - |
            mkdir -p /var/hyperledger/orderer-data/msp/admincerts /var/hyperledger/orderer-data/msp/cacerts /var/hyperledger/orderer-data/msp/keystore /var/hyperledger/orderer-data/msp/signcerts /var/hyperledger/orderer-data/msp/tlscacerts /var/hyperledger/orderer-data/tls
            cp /tmp/msp/cacert.pem /var/hyperledger/orderer-data/msp/cacerts/
            cp /tmp/msp/tlscacert.pem /var/hyperledger/orderer-data/msp/tlscacerts/
            cp /tmp/msp/signcert.pem /var/hyperledger/orderer-data/msp/signcerts/
            cp /tmp/msp/keystore.pem /var/hyperledger/orderer-data/msp/keystore/
            cp /tmp/msp/admincert.pem /var/hyperledger/orderer-data/msp/admincerts/
            cp /tmp/msp/server.crt /var/hyperledger/orderer-data/tls/server.crt
            cp /tmp/msp/server.key /var/hyperledger/orderer-data/tls/server.key
            cp /tmp/msp/ca.crt /var/hyperledger/orderer-data/tls/ca.crt
        volumeMounts:
        - name: orderer-msp-secret
          mountPath: /tmp/msp
        - name: orderer-data-volume
          mountPath: /var/hyperledger/orderer-data
      containers:
      - name: orderer1
        image: hyperledger/fabric-orderer:2.4
        # --- KUNCI RAFT: MENGENALKAN IP ORDERER LAIN ---
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "$ORDERER1_SERVICE_HOST orderer1.parking.com" >> /etc/hosts
            echo "$ORDERER2_SERVICE_HOST orderer2.parking.com" >> /etc/hosts
            echo "$ORDERER3_SERVICE_HOST orderer3.parking.com" >> /etc/hosts
            orderer
        # -----------------------------------------------
        env:
        - name: FABRIC_LOGGING_SPEC
          value: info
        - name: ORDERER_GENERAL_LISTENADDRESS
          value: 0.0.0.0
        - name: ORDERER_GENERAL_LISTENPORT
          value: "7050"
        - name: ORDERER_GENERAL_LOCALMSPID
          value: OrdererMSP
        - name: ORDERER_GENERAL_LOCALMSPDIR
          value: /var/hyperledger/orderer-data/msp
        - name: ORDERER_GENERAL_TLS_ENABLED
          value: "true"
        - name: ORDERER_GENERAL_TLS_PRIVATEKEY
          value: /var/hyperledger/orderer-data/tls/server.key
        - name: ORDERER_GENERAL_TLS_CERTIFICATE
          value: /var/hyperledger/orderer-data/tls/server.crt
        - name: ORDERER_GENERAL_TLS_ROOTCAS
          value: "[/var/hyperledger/orderer-data/tls/ca.crt]"
        - name: ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE
          value: /var/hyperledger/orderer-data/tls/server.crt
        - name: ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY
          value: /var/hyperledger/orderer-data/tls/server.key
        - name: ORDERER_GENERAL_CLUSTER_ROOTCAS
          value: "[/var/hyperledger/orderer-data/tls/ca.crt]"
        - name: ORDERER_GENERAL_BOOTSTRAPMETHOD
          value: file
        - name: ORDERER_GENERAL_BOOTSTRAPFILE
          value: /var/hyperledger/orderer/genesis/genesis.block
        - name: ORDERER_OPERATIONS_LISTENADDRESS
          value: 0.0.0.0:8443
        - name: ORDERER_METRICS_PROVIDER
          value: prometheus
        ports:
        - containerPort: 7050
          name: grpc
        - containerPort: 8443
          name: operations
        volumeMounts:
        - name: genesis-vol
          mountPath: /var/hyperledger/orderer/genesis/genesis.block
          subPath: genesis.block
          readOnly: true
        - name: orderer-data-volume
          mountPath: /var/hyperledger/orderer-data
        - name: orderer-prod-volume
          mountPath: /var/hyperledger/production
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1024Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8443
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8443
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: genesis-vol
        configMap:
          name: genesis-block
      - name: orderer-msp-secret
        secret:
          secretName: orderer1-msp-secret
      - name: orderer-data-volume
        emptyDir: {}
      - name: orderer-prod-volume
        emptyDir: {}

