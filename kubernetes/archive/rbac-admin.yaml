apiVersion: v1
kind: ServiceAccount
metadata:
  name: account-cluster-manager-dashboard
  namespace: chaos-mesh
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bind-cluster-manager-dashboard
subjects:
  - kind: ServiceAccount
    name: account-cluster-manager-dashboard
    namespace: chaos-mesh
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io