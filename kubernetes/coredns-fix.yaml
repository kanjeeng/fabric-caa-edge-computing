apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
           lameduck 5s
        }
        ready
        # --- FIX DNS FABRIC (Domain Asli -> Service K8s) ---
        rewrite name orderer.orderer.parking.com orderer.parking-fabric.svc.cluster.local
        rewrite name peer0.zone-a.parking.com peer-zone-a.parking-fabric.svc.cluster.local
        rewrite name peer0.zone-b.parking.com peer-zone-b.parking-fabric.svc.cluster.local
        rewrite name peer0.zone-c.parking.com peer-zone-c.parking-fabric.svc.cluster.local
        # ---------------------------------------------------
        kubernetes cluster.local in-addr.arpa ip6.arpa {
           pods insecure
           fallthrough in-addr.arpa ip6.arpa
           ttl 30
        }
        prometheus :9153
        forward . /etc/resolv.conf {
           max_concurrent 1000
        }
        cache 30
        loop
        reload
        loadbalance
    }
