# kubernetes/05-caa-controller.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: caa-controller
  namespace: parking-fabric

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: caa-controller-role
  namespace: parking-fabric
rules:
# Read pods metrics
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# Read/Write deployments (for scaling)
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale"]
  verbs: ["get", "list", "watch", "update", "patch"]
# Read metrics
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: caa-controller-binding
  namespace: parking-fabric
subjects:
- kind: ServiceAccount
  name: caa-controller
  namespace: parking-fabric
roleRef:
  kind: Role
  name: caa-controller-role
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caa-controller
  namespace: parking-fabric
  labels:
    app: caa-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caa-controller
  template:
    metadata:
      labels:
        app: caa-controller
    spec:
      serviceAccountName: caa-controller
      containers:
      - name: controller
        image: caa-controller:latest
        imagePullPolicy: Never  # Use local image for Minikube
        env:
        - name: KUBERNETES_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CONTROL_LOOP_INTERVAL
          value: "60"  # 60 seconds
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        volumeMounts:
        - name: logs
          mountPath: /var/log
      volumes:
      - name: logs
        emptyDir: {}