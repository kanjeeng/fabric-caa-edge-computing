<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANA Parking Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; color: #2c3e50; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { 
            background: white; padding: 20px; border-radius: 10px; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 6px solid #bdc3c7;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .occupied { border-top-color: #e74c3c; } /* Merah */
        .available { border-top-color: #2ecc71; } /* Hijau */
        .spot-id { font-size: 1.2em; font-weight: bold; color: #34495e; margin-bottom: 5px; }
        .zone-badge { font-size: 0.8em; color: #7f8c8d; background: #ecf0f1; padding: 3px 8px; border-radius: 12px; display: inline-block; margin-bottom: 15px; }
        .status-text { font-size: 1.1em; font-weight: bold; }
        .occupied .status-text { color: #e74c3c; }
        .available .status-text { color: #2ecc71; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚗 Live Smart Parking Dashboard</h1>
        <p>Data ditarik <b>Real-Time</b> dari Ledger Hyperledger Fabric</p>
    </div>

    <div class="grid" id="parking-container">
        <h3 style="text-align:center; width:100%; color:#7f8c8d;">Menghubungkan ke Jaringan Blockchain...</h3>
    </div>

    <script>
        // URL ke Bridge API yang baru kita buat
        const API_URL = 'http://localhost:30883/api/spots';

        async function fetchParkingData() {
            try {
                const response = await fetch(API_URL);
                const json = await response.json();
                
                if(json.success) {
                    renderSpots(json.data);
                }
            } catch (error) {
                console.error("Gagal menarik data:", error);
                document.getElementById('parking-container').innerHTML = 
                    '<h3 style="color:red; text-align:center; width:100%;">Gagal terhubung ke Blockchain. Pastikan Bridge API berjalan.</h3>';
            }
        }

        function renderSpots(spots) {
            const container = document.getElementById('parking-container');
            container.innerHTML = ''; // Bersihkan loading

            // Urutkan angka ID agar rapi (misal: spot-1, spot-2)
            spots.sort((a, b) => {
                const numA = parseInt(a.id.replace(/\D/g, ''));
                const numB = parseInt(b.id.replace(/\D/g, ''));
                return numA - numB;
            });

            spots.forEach(spot => {
                const isOccupied = spot.status === 'occupied';
                const cardClass = isOccupied ? 'card occupied' : 'card available';
                const statusText = isOccupied ? 'TERISI' : 'TERSEDIA';

                const cardHTML = `
                    <div class="${cardClass}">
                        <div class="spot-id">${spot.id.toUpperCase()}</div>
                        <div class="zone-badge">ZONA: ${spot.zone.toUpperCase()}</div>
                        <div class="status-text">${statusText}</div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // Jalankan fetch pertama kali
        fetchParkingData();
        // Update setiap 3 detik
        setInterval(fetchParkingData, 3000);
    </script>
</body>
</html>
